<script>
	document.addEventListener('DOMContentLoaded', () => {
		const copyEmailButtons = document.querySelectorAll('.copy-email');
		copyEmailButtons.forEach(button => {
			button.addEventListener('click', () => {
				const email = button.getAttribute('data-email');
				if (email) {
					navigator.clipboard.writeText(email)
							.then(() => {
								alert('Email copié dans le presse-papier : ' + email);
							})
							.catch(err => {
								alert('Impossible de copier l\'email : ' + err);
							});
				}
			});
		});
	});


	// Fonction pour basculer l'affichage du contenu
	function toggleProjectDisplay(buttonId, contextId) {
		var btn = document.getElementById(buttonId);
		if(!btn) return;
		btn.addEventListener("click", function() {
			var contexte = document.getElementById(contextId);
			if (contexte.style.display === "none") {
				contexte.style.display = "block";  // Afficher le contenu
				this.textContent = "Cacher Contenu du Projet"; // Changer le texte du bouton
			} else {
				contexte.style.display = "none";  // Cacher le contenu
				this.textContent = "Afficher Contexte du Projet"; // Réinitialiser le texte du bouton
			}
		});
	}

	// Fonction pour basculer l'affichage du contenu
	function toggleProjectDisplay2(buttonId, contextId) {
		var btn = document.getElementById(buttonId);
		if(!btn) return;
		btn.addEventListener("click", function() {
			var contexte = document.getElementById(contextId);
			if (contexte.style.display === "none") {
				contexte.style.display = "block";  // Afficher le contenu
				this.textContent = "Cacher détaille compétence"; // Changer le texte du bouton
			} else {
				contexte.style.display = "none";  // Cacher le contenu
				this.textContent = "Afficher détaille compétence"; // Réinitialiser le texte du bouton
			}
		});
	}



	// Appliquer la fonction à chaque bouton pour les deux projets
	toggleProjectDisplay("toggleButton1", "contexte1");
	toggleProjectDisplay("toggleButton2", "contexte2");
	toggleProjectDisplay("toggleButton3", "contexte3");
	toggleProjectDisplay2("toggleButton4", "contexte4");
	toggleProjectDisplay2("toggleButton5", "contexte5");
	toggleProjectDisplay2("toggleButton6", "contexte6");

	// Nouveaux projets ajoutés
	toggleProjectDisplay("toggleButton7", "contexte7"); // Météo
	toggleProjectDisplay("toggleButton8", "contexte8"); // Avatar
	toggleProjectDisplay("toggleButton9", "contexte9"); // Critiques
	toggleProjectDisplay("toggleButtonStage", "contexteStage"); // Stage

</script>
